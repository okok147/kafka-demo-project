      - key: POSTGRES_DSN
        fromDatabase:
          name: kafka-demo-postgres
          property: connectionString

  - type: worker
    name: portfolio-service
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python -m kafka_demo.entrypoints.portfolio_service
    envVars:
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: kafka-broker:9092
      - key: POSTGRES_DSN
        fromDatabase:
          name: kafka-demo-postgres
          property: connectionString

  - type: worker
    name: replay-runner
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python -m kafka_demo.entrypoints.replay_runner
    envVars:
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: kafka-broker:9092
      - key: POSTGRES_DSN
        fromDatabase:
          name: kafka-demo-postgres
          property: connectionString

  - type: worker
    name: deadletter-handler
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python -m kafka_demo.entrypoints.deadletter_handler
    envVars:
      - key: KAFKA_BOOTSTRAP_SERVERS
