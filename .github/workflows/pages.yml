name: Deploy Docs Website

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site
        run: |
          mkdir -p site
          cp -R pages/. site/
          sed -i "s|__GITHUB_SHA__|${GITHUB_SHA}|g" site/index.html
          sed -i "s|__BUILD_TIME__|$(date -u +"%Y-%m-%d %H:%M:%S UTC")|g" site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - uses: actions/deploy-pages@v4
